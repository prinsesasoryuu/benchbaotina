<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Bench</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
            margin: 0;
        }
        nav {
            background: #444;
            overflow: hidden;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            margin: 0;
        }
        nav ul li a {
            display: block;
            padding: 1rem;
            color: white;
            text-decoration: none;
        }
        nav ul li a:hover {
            background: #555;
        }
        main {
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .cart-items {
            margin-top: 2rem;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .cart-item img {
            width: 100px;
            height: auto;
            border-radius: 8px;
        }
        .cart-item div {
            flex: 1;
            margin-left: 1rem;
        }
        .cart-item button {
            padding: 0.5rem 1rem;
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .cart-item button:hover {
            background-color: #c0392b;
        }
        .total {
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Your Cart</h1>
    </header>
 <nav>
    <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="checkout.html">Checkout</a></li>
            <li><a href="orders.html">My Orders</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
    </ul>
</nav>
    <main>
        <h2>Items in Your Cart</h2>
        <div class="cart-items" id="cart-items">
            <!-- Cart items will be dynamically added here -->
        </div>
        <div class="total" id="total">
            Total: $0.00
        </div>
    </main>
<script>
    // Example cart data (replace with dynamic data in a real project)
    const cart = [
        { name: 'So In Love', price: 10.99, image: 'so.jpg', quantity: 1 },
        { name: 'I Rock Bench', price: 12.99, image: 'rock.jpg', quantity: 2 },
        { name: 'I Sport Bench', price: 9.99, image: 'spor.jpg', quantity: 1 }
    ];

    const cartItemsContainer = document.getElementById('cart-items');
    const totalContainer = document.getElementById('total');

    // Render cart items
    function renderCart() {
        cartItemsContainer.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
            const cartItem = document.createElement('div');
            cartItem.classList.add('cart-item');
            cartItem.innerHTML = `
                <img src="${item.image}" alt="${item.name}">
                <div>
                    <h3>${item.name}</h3>
                    <p>Price: $${item.price.toFixed(2)}</p>
                    <p>
                        Quantity: 
                        <button onclick="decreaseQuantity(${index})">-</button>
                        ${item.quantity}
                        <button onclick="increaseQuantity(${index})">+</button>
                    </p>
                </div>
                <button onclick="removeItem(${index})">Remove</button>
            `;
            cartItemsContainer.appendChild(cartItem);
            total += item.price * item.quantity;
        });

        totalContainer.textContent = `Total: $${total.toFixed(2)}`;
    }

    // Increase item quantity
    function increaseQuantity(index) {
        cart[index].quantity += 1;
        renderCart();
    }

    // Decrease item quantity
    function decreaseQuantity(index) {
        if (cart[index].quantity > 1) {
            cart[index].quantity -= 1;
        } else {
            alert('Quantity cannot be less than 1.');
        }
        renderCart();
    }

    // Remove item from cart
    function removeItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    // Initial render
    renderCart();
</script>

</body>

</html>
