<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Bench</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #f9f9f9 0%, #ffe0ec 100%);
        min-height: 100vh;
    }
    header {
        background: linear-gradient(90deg, #ffb6c1 0%, #ff69b4 100%);
        color: #fff;
        padding: 2rem 0 1rem 0;
        text-align: center;
        box-shadow: 0 2px 8px rgba(255, 182, 193, 0.2);
    }
    header h1 {
        font-size: 2.5rem;
        margin: 0;
        letter-spacing: 2px;
        font-weight: bold;
        text-shadow: 1px 2px 8px #fff5;
    }
    nav {
        background: #444;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
    }
    nav ul li {
        margin: 0;
    }
    nav ul li a {
        display: block;
        padding: 1rem 1.5rem;
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.2s, color 0.2s;
    }
    nav ul li a:hover, nav ul li a.active {
        background: #ffb6c1;
        color: #222;
    }
    main {
        padding: 2rem;
        max-width: 800px;
        margin: 2rem auto;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(255,182,193,0.15);
    }
    .back-button-container {
        text-align: left;
        margin-bottom: 1.5rem;
    }
    #back-to-products {
        padding: 0.8rem 1.5rem;
        background: linear-gradient(90deg, #ffb6c1 0%, #ff69b4 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        transition: background 0.2s, color 0.2s, transform 0.2s;
        box-shadow: 0 2px 8px #ffd6e055;
    }
    #back-to-products:hover {
        background: #d72660;
        color: #fff;
        transform: scale(1.07);
    }
    h2 {
        color: #d72660;
        margin-bottom: 1.5rem;
        font-size: 2rem;
        font-weight: 600;
    }
    .cart-items {
        margin-top: 2rem;
    }
    .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border: 1px solid #ffd6e0;
        border-radius: 12px;
        margin-bottom: 1rem;
        background: #fff6fa;
        box-shadow: 0 2px 8px #ffd6e055;
        transition: box-shadow 0.2s;
    }
    .cart-item:hover {
        box-shadow: 0 8px 32px rgba(255,182,193,0.18);
        border-color: #ffb6c1;
    }
    .cart-item img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 8px;
        box-shadow: 0 2px 8px #ffd6e055;
    }
    .cart-item div {
        flex: 1;
        margin-left: 1rem;
    }
    .cart-item h3 {
        margin: 0 0 0.5rem 0;
        color: #d72660;
        font-size: 1.1rem;
        font-weight: 600;
    }
    .cart-item p {
        margin: 0.2rem 0;
        color: #555;
    }
    .cart-item button {
        padding: 0.5rem 1rem;
        background-color: #e74c3c;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s, transform 0.2s;
    }
    .cart-item button:hover {
        background-color: #c0392b;
        transform: scale(1.07);
    }
    .quantity-controls button {
        padding: 0.3rem 0.6rem;
        background-color: #333;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin: 0 0.2rem;
        transition: background 0.2s, transform 0.2s;
    }
    .quantity-controls button:hover {
        background-color: #555;
        transform: scale(1.1);
    }
    .total {
        text-align: right;
        font-size: 1.2rem;
        font-weight: bold;
        margin-top: 1rem;
        color: #d72660;
    }
    .total-quantity {
        text-align: right;
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 0.5rem;
        color: #333;
    }
    .checkout-form {
        margin-top: 2.5rem;
        background: #fff6fa;
        border-radius: 12px;
        padding: 2rem 1rem 1rem 1rem;
        box-shadow: 0 2px 8px #ffd6e055;
    }
    .checkout-form label {
        font-weight: bold;
        display: block;
        margin-bottom: 0.5rem;
        color: #d72660;
    }
    .checkout-form input {
        width: 100%;
        padding: 0.8rem;
        margin-bottom: 1rem;
        border: 1px solid #ffd6e0;
        border-radius: 4px;
        font-size: 1rem;
    }
    .checkout-form button {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(90deg, #ffb6c1 0%, #ff69b4 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        transition: background 0.2s, color 0.2s, transform 0.2s;
        box-shadow: 0 2px 8px #ffd6e055;
    }
    .checkout-form button:hover {
        background: #d72660;
        color: #fff;
        transform: scale(1.04);
    }
    @media (max-width: 700px) {
        main {
            padding: 1rem;
        }
        .cart-item {
            flex-direction: column;
            align-items: flex-start;
        }
        .cart-item img {
            margin-bottom: 1rem;
        }
        .checkout-form {
            padding: 1rem 0.5rem;
        }
    }
</style>
</head>
<body>
    <header>
        <h1>Checkout</h1>
    </header>
    <nav>
        <ul>
            <li id="login-link"><a href="#" onclick="showLoginForm()">Login</a></li>
<li id="create-link"><a href="#" onclick="showCreateForm()">Create Account</a></li>
<li id="user-display" style="display:none; color:#d72660; font-weight:bold; align-items:center;"></li>
<li id="logout-link" style="display:none;"><a href="#" onclick="logout()">Logout</a></li>
            <li><a href="home.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="checkout.html">Checkout</a></li>
            <li><a href="orders.html">My Orders</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>
    <main>
        <div class="back-button-container">
            <button id="back-to-products">Back to Products</button>
        </div>
        <h2>Review Your Order</h2>
        <div class="cart-items" id="cart-items">
            <!-- Cart items will be dynamically added here -->
        </div>
        <div class="total-quantity" id="total-quantity">
            Total Quantity: 0
        </div>
        <div class="total" id="total">
            Total: $0.00
        </div>
        <!-- Login Modal -->
<div id="login-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.4); z-index:1000;">
    <div style="background:#fff; max-width:350px; margin:10% auto; padding:2rem; border-radius:12px; box-shadow:0 4px 24px #ffd6e055; position:relative;">
        <h2 style="color:#d72660;">Login</h2>
        <input id="login-username" type="text" placeholder="Username" style="width:100%;padding:0.7rem;margin-bottom:1rem;border:1px solid #ffd6e0;border-radius:6px;">
        <input id="login-password" type="password" placeholder="Password" style="width:100%;padding:0.7rem;margin-bottom:1rem;border:1px solid #ffd6e0;border-radius:6px;">
        <button onclick="login()" style="width:100%;padding:0.7rem;background:linear-gradient(90deg,#ffb6c1 0%,#ff69b4 100%);color:#fff;border:none;border-radius:8px;font-weight:bold;">Login</button>
        <button onclick="hideLoginForm()" style="width:100%;padding:0.7rem;margin-top:0.5rem;background:#eee;color:#d72660;border:none;border-radius:8px;">Cancel</button>
        <div id="login-error" style="color:#e74c3c; margin-top:0.5rem; text-align:center;"></div>
    </div>
</div>
<!-- Create Account Modal -->
<div id="create-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.4); z-index:1000;">
    <div style="background:#fff; max-width:350px; margin:10% auto; padding:2rem; border-radius:12px; box-shadow:0 4px 24px #ffd6e055; position:relative;">
        <h2 style="color:#d72660;">Create Account</h2>
        <input id="create-username" type="text" placeholder="Username" style="width:100%;padding:0.7rem;margin-bottom:1rem;border:1px solid #ffd6e0;border-radius:6px;">
        <input id="create-password" type="password" placeholder="Password" style="width:100%;padding:0.7rem;margin-bottom:1rem;border:1px solid #ffd6e0;border-radius:6px;">
        <button onclick="createAccount()" style="width:100%;padding:0.7rem;background:linear-gradient(90deg,#ffb6c1 0%,#ff69b4 100%);color:#fff;border:none;border-radius:8px;font-weight:bold;">Create Account</button>
        <button onclick="hideCreateForm()" style="width:100%;padding:0.7rem;margin-top:0.5rem;background:#eee;color:#d72660;border:none;border-radius:8px;">Cancel</button>
        <div id="create-error" style="color:#e74c3c; margin-top:0.5rem; text-align:center;"></div>
    </div>
</div>
        <form class="checkout-form" id="checkout-form">
            <h2>Billing Information</h2>
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="Enter your full name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="address">Shipping Address:</label>
            <input type="text" id="address" placeholder="Enter your shipping address" required>

            <button type="submit">Place Order</button>
        </form>
    </main>
    <script>
        
        const cartItemsContainer = document.getElementById('cart-items');
        const totalContainer = document.getElementById('total');
        const checkoutForm = document.getElementById('checkout-form');

        // Retrieve cart from localStorage
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Render cart items
        function renderCart() {
            cartItemsContainer.innerHTML = '';
            let total = 0;
            let totalQuantity = 0;

            cart.forEach((item, index) => {
                const cartItem = document.createElement('div');
                cartItem.classList.add('cart-item');
                cartItem.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div>
                        <h3>${item.name}</h3>
                        <p>Price: $${item.price.toFixed(2)}</p>
                        <p>
                            Quantity: 
                            <span class="quantity-controls">
                                <button onclick="decreaseQuantity(${index})">-</button>
                                ${item.quantity}
                                <button onclick="increaseQuantity(${index})">+</button>
                            </span>
                        </p>
                    </div>
                    <button onclick="removeItem(${index})">Remove</button>
                `;
                cartItemsContainer.appendChild(cartItem);
                total += item.price * item.quantity;
                totalQuantity += item.quantity; // Add item quantity to total quantity
            });

            totalContainer.textContent = `Total: $${total.toFixed(2)}`;
            document.getElementById('total-quantity').textContent = `Total Quantity: ${totalQuantity}`;
        }

        // Increase item quantity
        function increaseQuantity(index) {
            cart[index].quantity += 1;
            saveCart();
            renderCart();
        }

        // Decrease item quantity
        function decreaseQuantity(index) {
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
            } else {
                alert('Quantity cannot be less than 1.');
            }
            saveCart();
            renderCart();
        }

        // Remove item from cart
        function removeItem(index) {
            cart.splice(index, 1);
            saveCart();
            renderCart();
        }

        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

checkoutForm.addEventListener('submit', (e) => {
    e.preventDefault();

    // Require login before placing order
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        alert('You must login before you can place an order.');
        showLoginForm();
        return;
    }

    // Get user info
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const address = document.getElementById('address').value;

    // Prepare order object
    const order = {
        name,
        email,
        address,
        items: cart,
        total: cart.reduce((sum, item) => sum + item.price * item.quantity, 0),
        date: new Date().toLocaleString()
    };

    // Save order to localStorage
    let myOrders = JSON.parse(localStorage.getItem('myOrders')) || [];
    myOrders.push(order);
    localStorage.setItem('myOrders', JSON.stringify(myOrders));

    alert('Thank you for your order! Your items will be shipped soon.');
    localStorage.removeItem('cart'); // Clear the cart
    window.location.href = 'home.html'; // Redirect to the homepage
});

        // Redirect to products page
        const backToProductsButton = document.getElementById('back-to-products');
        backToProductsButton.addEventListener('click', () => {
            window.location.href = 'products.html';
        });

        // Initial render
        renderCart();

function showLoginForm() {
    document.getElementById('login-modal').style.display = 'block';
}
function hideLoginForm() {
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('login-error').textContent = '';
}
function showCreateForm() {
    document.getElementById('create-modal').style.display = 'block';
}
function hideCreateForm() {
    document.getElementById('create-modal').style.display = 'none';
    document.getElementById('create-error').textContent = '';
}
function login() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    const users = JSON.parse(localStorage.getItem('users') || '{}');
    if (users[username] && users[username] === password) {
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('currentUser', username);
        hideLoginForm();
        updateAuthLinks();
    } else {
        document.getElementById('login-error').textContent = 'Invalid username or password.';
    }
}
function logout() {
    if (confirm('Do you want to logout?')) {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('currentUser');
        updateAuthLinks();
    }
}
function createAccount() {
    const username = document.getElementById('create-username').value.trim();
    const password = document.getElementById('create-password').value;
    let users = JSON.parse(localStorage.getItem('users') || '{}');
    if (!username || !password) {
        document.getElementById('create-error').textContent = 'Please enter a username and password.';
        return;
    }
    if (users[username]) {
        document.getElementById('create-error').textContent = 'Username already exists.';
        return;
    }
    users[username] = password;
    localStorage.setItem('users', JSON.stringify(users));
    document.getElementById('create-error').textContent = 'Account created! You can now log in.';
    setTimeout(() => {
        hideCreateForm();
        showLoginForm();
    }, 1200);
}
function updateAuthLinks() {
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    const username = localStorage.getItem('currentUser') || '';
    document.getElementById('login-link').style.display = isLoggedIn ? 'none' : '';
    document.getElementById('create-link').style.display = isLoggedIn ? 'none' : '';
    document.getElementById('logout-link').style.display = isLoggedIn ? '' : 'none';
    const userDisplay = document.getElementById('user-display');
    if (isLoggedIn && username) {
        userDisplay.style.display = '';
        userDisplay.textContent = `👤 ${username}`;
    } else {
        userDisplay.style.display = 'none';
        userDisplay.textContent = '';
    }
}
updateAuthLinks();

    </script>
</body>
</html>
